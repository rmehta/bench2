bench:
  name: ci-bench
  python: "3.14"
  process_manager: honcho
  http_port: 8000
  socketio_port: 9000

apps:
  - name: frappe
    repo: https://github.com/frappe/frappe
    branch: version-15
  - name: payments
    repo: https://github.com/frappe/payments
    branch: version-15

sites:
  - name: site1.localhost
    admin_password: "admin"
    apps:
      - frappe
  - name: site2.localhost
    admin_password: "admin"
    apps:
      - frappe
      - payments

mariadb:
  host: localhost
  port: 3306
  root_password: "admin"
  admin_user: root

redis:
  cache_port: 13000
  queue_port: 11000
  socketio_port: 12000

workers:
  default: 1
  short: 1
  long: 1

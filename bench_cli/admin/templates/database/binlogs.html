{% extends 'base.html' %}
{% block content %}

<h2>Database</h2>

<div style="display:flex;gap:16px;margin-bottom:18px">
  <a href="/database/binlogs" style="font-weight:500;color:var(--gray-900)">Binary logs</a>
  <a href="/database/slow-queries" class="text-muted">Slow queries</a>
</div>

<div class="card">
  <table>
    <thead>
      <tr><th>Log name</th><th>Size</th><th></th></tr>
    </thead>
    <tbody>
      {% for log in binary_logs %}
      <tr>
        <td class="mono">{{ log.log_name }}</td>
        <td class="text-muted">{{ (log.file_size / 1024 / 1024) | round(2) }} MB</td>
        <td><a href="/database/binlogs/{{ log.log_name }}">View →</a></td>
      </tr>
      {% else %}
      <tr><td colspan="3" class="text-muted">No binary logs found.</td></tr>
      {% endfor %}
    </tbody>
  </table>
</div>

{% endblock %}
